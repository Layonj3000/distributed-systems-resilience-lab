<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>

<h1>Order Management</h1>

{% if service_unavailable %}
<p style="color:red;">
    Order service temporarily unavailable.
</p>
{% endif %}

<form action="/create" method="post">
    <input
        type="text"
        name="description"
        placeholder="Order description"
        required
    >
    <button type="submit">
        Create
    </button>
</form>

<hr>

<h2>Orders</h2>

<ul>
{% for order in orders %}
    <li>
        {{ order.id }} - {{ order.description }}
    </li>
{% endfor %}
</ul>

</body>
</html>
