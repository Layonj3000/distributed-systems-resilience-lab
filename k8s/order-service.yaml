apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      initContainers:
      - name: slow-start
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "echo aquecendo...; sleep 25"]

      containers:
      - name: order-service

        image: distributed-systems-resilience-lab-order-service:latest

        imagePullPolicy: Never

        env:
        - name: DATABASE_URL
          value: postgresql://postgres:postgres@postgres:5432/orders_db

        ports:
        - containerPort: 8001
        
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service

metadata:
  name: order-service

spec:
  selector:
    app: order-service

  ports:
  - port: 8001
    targetPort: 8001